<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ARGUS alert</title>
</head>
<body>
  <h2>ARGUS alert: {{monitorName}} is down</h2>
  <p>Monitor <strong>{{monitorName}}</strong> has failed recent health checks.</p>
  <p><strong>URL:</strong> {{monitorUrl}}<br/>
  <strong>Detected:</strong> {{eventTime}}<br/>
  <strong>Reason:</strong> {{failureReason}}</p>
  <p>This notification was generated by ARGUS monitoring.</p>
</body>
</html>
