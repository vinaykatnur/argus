spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/argus?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

argus:
  jwt:
    secret: ${JWT_SECRET}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}