spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/argus?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}

argus:
  jwt:
    secret: ${JWT_SECRET}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}