server:
  port: ${PORT:${SERVER_PORT:8080}}

spring:
  application:
    name: argus
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
  mail:
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

argus:
  jwt:
    issuer: ${JWT_ISSUER:argus}
    secret: ${JWT_SECRET:}
    access-token-expiration-minutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:15}
    refresh-token-expiration-days: ${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:7}
  auth:
    verification-token-expiration-minutes: ${VERIFICATION_TOKEN_EXPIRATION_MINUTES:30}
    password-reset-token-expiration-minutes: ${PASSWORD_RESET_TOKEN_EXPIRATION_MINUTES:15}
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
    require-email-verification: ${REQUIRE_EMAIL_VERIFICATION:false}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  monitoring:
    minimum-interval-seconds: ${MONITORING_MINIMUM_INTERVAL_SECONDS:60}
    maximum-interval-seconds: ${MONITORING_MAXIMUM_INTERVAL_SECONDS:86400}
    minimum-failure-threshold: ${MONITORING_MINIMUM_FAILURE_THRESHOLD:2}
    default-failure-threshold: ${MONITORING_DEFAULT_FAILURE_THRESHOLD:3}
    request-timeout-seconds: ${MONITORING_REQUEST_TIMEOUT_SECONDS:10}
    slow-response-threshold-millis: ${MONITORING_SLOW_RESPONSE_THRESHOLD_MILLIS:3000}
    worker-pool-size: ${MONITORING_WORKER_POOL_SIZE:20}
    scheduler-fixed-delay-millis: ${MONITORING_SCHEDULER_FIXED_DELAY_MILLIS:30000}
    scheduler-batch-size: ${MONITORING_SCHEDULER_BATCH_SIZE:200}
  incident-intelligence:
    ai:
      encryption-secret: ${AI_CREDENTIAL_ENCRYPTION_SECRET:${JWT_SECRET:}}
      timeout-seconds: ${AI_PROVIDER_TIMEOUT_SECONDS:20}

management:
  endpoints:
    web:
      exposure:
        include: health
