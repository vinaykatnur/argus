version: '3.9'
services:
  argus:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '8080:8080'
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_URL: jdbc:mysql://mysql:3306/argus_prod?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: argus
      JWT_SECRET: change-me
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    depends_on:
      - mysql

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: argus
      MYSQL_DATABASE: argus_prod
    ports:
      - '3306:3306'
